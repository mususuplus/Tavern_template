吾编织的感知盲点。”',大祭司:'“令众生遗忘那不应存在的记忆，当吾之黑暗笼罩大地，一切凡俗之火皆将在绝对的虚无面前归于沉寂。”',神使:'“揭开或尘封秘密的时机皆由吾定夺，当吾干预那阴晴圆缺，潮汐与宿命亦将随月相的更迭而剧变。”'},瓦尔坎:{受感者:'“嗅探那百步外即将喷薄的暴力之息，在铁与血的洗礼中，尔之躯壳将获得永不枯竭的战意与愈合。”',祭司:'“将吾之斗志播撒于万千铁骑，于决斗的神圣仪式中，胜负双方的魂灵皆将受缚于吾之裁断。”',大祭司:'“凡吾所指之处，千军万马必将陷入狂热或绝望，受吾加持之军在日落前将立于不败之地。”',神使:'“吾即战争的始终，吾之裁定将改写战场的宿命，令一国之兴衰、万民之征战皆止于吾之终极宣判。”'},莫尔甘:{受感者:'“预见那生命之烛熄灭的余温，尔之双眼必能穿透生死的隔阂，直视那些徘徊于尘世边缘的凄冷游魂。”',祭司:'“以葬仪之锁锢守不朽的遗蜕，令亵渎者无从染指，并指引彷徨的亡灵在安息的颂歌中归于吾之怀抱。”',大祭司:'“在此城之中，死亡之秩序不容逆转，任何唤醒骸骨的禁术皆将在吾大规模引渡的圣光下消解无踪。”',神使:'“吾乃终结之时刻的守门人，凡违背死亡法则之存在必将被吾强制逐出，因世间生灵的终点皆由吾定。”'},艾尔薇恩:{受感者:'“倾听万物生灵的哀鸣与低语，任何针对大地的亵渎与扭曲，皆将在尔之荒野感知中无所遁形。”',祭司:'“唤醒种子的生机并愈合走兽的疮痍，令四时之流转在吾之祝福下，为这片土地降下繁荣或休眠。”',大祭司:'“令破碎的荒原在瞬息间重焕生机，当吾召唤雷雨或寒潮，整片疆域的气候皆将随吾之喜怒而剧变。”',神使:'“裁夺文明对大地的索取边界，凡越界贪婪者，必将领受吾那法则化作的、不可撤销的自然之怒。”'},梅萨娜:{受感者:'“触摸那隐匿于空气的玛那脉络，在每一卷尘封的古籍中，尔必能识破虚伪的篡改并寻回失落的真知。”',祭司:'“剥离法术那繁杂的外壳以直视其本源，并在求知者的灵魂刻下烙印，使其真理之光永不随岁月凋零。”',大祭司:'“令领域内的魔网脉络无所遁形，凡吾所禁绝之术式，纵是最高深的法师也无法调动半点元素之息。”',神使:'“吾乃知识传承的守密人，吾将重塑被蹂躏的魔法根源，在万物之基重申那不可违抗的奥法准则。”'},图尔克:{受感者:'“指尖所及，金属的瑕疵与根源皆如掌纹般清晰，任何巧言令色的拙劣工艺在尔面前皆无处遁形。”',祭司:'“将神火注入滚烫的炉心，令凡铁承载山岳之重，赋予宏伟的造物足以抗衡千载岁月的结构祝福。”',大祭司:'“令方圆之内的金石皆随吾心而软化或坚韧，凡卑劣偷安之造物，必将在吾之谴责宣判下加速崩解。”',神使:'“吾之裁决乃造物之终极勋章，凡吾册封为神圣之器物，其本质必将超越物质之极限，成就永恒不朽。”'}},cl={魔法学徒:'能够指动微光或掷出火球，勉力撑起抵御流箭的屏障并干扰敌方感官，却受限于干涸的魔力而无法维系多重术式。',正式法师:'撑起的护盾足以硬抗攻城重弩，能在翱翔天际时随心驾驭室内规模的元素之力，并布下洞悉潜入者的警戒结界。',大法师:'举手投足间操纵方圆里的天象并率队跨域传送，在瞬发低阶法术的同时，还能游刃有余地篡改他人的魔咒。',传奇法师:'能够开辟自定法则的独立半位面，感知笼罩百里疆域并在挥手间禁绝一切敌对魔法，其终极之威足以一击抹除整座要塞。',见习战士:'拥有在高强度战斗中屹立不倒的耐力，能劈裂钢甲并在十步内闪避弩箭，是足以单挑三两名正规士兵的战场新锐。',正式战士:'反应速度超越凡人五倍，能徒手砸裂城墙、以肉眼难辨的残影瞬时突进并拨开乱箭，且拥有极速愈合伤口的超凡体质。',精英战士:'爆发时足以突破音障，凭感官洞悉万物震动并硬抗法师轰击，挥剑而出的真空斩击可隔空百步削断巨木。',英雄战士:'全力一击足以劈开巍峨山岳并正面抗衡禁咒洗礼，能在呼吸间跨越城镇，即便内脏重伤亦能在数小时内自我复原。',普通冒险者:'平凡的起点，却孕育着无限的可能。在这破碎的世界中，你的每一步都将铸就属于自己的传奇。'},ul=['无','索利昂(光明之神)','诺克萨拉(黑暗之神)','瓦尔坎(战争之神)','莫尔甘(死亡之神)','艾尔薇恩(自然之神)','梅萨娜(魔法之神)','图尔克(锻造之神)'],dl=['中央翡翠平原','北方凛冬山脉','西方永夜森林','东方赤砂荒漠','南方枯萎之地','浮空疆域'],pl=({onComplete:e})=>{const[t,n]=(0,i.useState)(0),[r,a]=(0,i.useState)({profession:'普通冒险者',faith:ul[0],location:dl[0],status:'健康',currency:{gold:10,silver:0,co
